services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://colloquip:${DB_PASSWORD:-colloquip}@postgres:5432/colloquip"
      ENVIRONMENT: production
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-mock}"
      MEMORY_STORE: "${MEMORY_STORE:-pgvector}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FORMAT: json
      WATCHER_POLL_INTERVAL: "${WATCHER_POLL_INTERVAL:-300}"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: colloquip
      POSTGRES_USER: colloquip
      POSTGRES_PASSWORD: "${DB_PASSWORD:-colloquip}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colloquip"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
