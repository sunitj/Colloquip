engine:
  max_turns: 30
  min_posts: 12
  energy_threshold: 0.2
  low_energy_rounds: 3
  refractory_period: 2
  hysteresis_threshold: 3
  phase_max_tokens:
    explore: 1024
    debate: 1280
    deepen: 1024
    converge: 768
    synthesis: 2048

observer:
  hysteresis_threshold: 2
  window_size: 5
  min_posts_before_converge: 8
  observation_frequency: 0.5

  explore_question_rate_min: 0.25
  explore_topic_diversity_min: 0.5
  debate_disagreement_rate_min: 0.3
  debate_citation_density_min: 0.4
  deepen_topic_diversity_max: 0.5
  deepen_novelty_avg_min: 0.4
  converge_energy_max: 0.35
  converge_posts_since_novel_min: 3

energy:
  window: 10
  weights:
    novelty: 0.4
    disagreement: 0.3
    questions: 0.2
    staleness: -0.1
  novelty_bonus_per_connection: 0.1
  max_novelty_bonus: 0.3
  optimal_disagreement_rate: 0.4
  max_open_questions: 5
  posts_since_novel_threshold: 10
  repetition_weight: 2.0
  min_posts: 12
  max_posts: 50
  energy_threshold: 0.2
  low_energy_rounds: 3
  injection:
    new_knowledge: 0.3
    human_intervention: 0.4
    novel_post: 0.2
    red_team_challenge: 0.15

triggers:
  window: 5
  refractory_period: 2
  relevance_min_keyword_matches: 2
  relevance_phase_modulation:
    explore: 1
    debate: 2
    deepen: 3
    converge: 3
  silence_min_conversation_length: 8
  silence_max: 6
  silence_phase_modulation:
    explore: 4
    debate: 6
    deepen: 8
    converge: 6
  bridge_min_agents: 2
  red_team_consensus_threshold: 3
  red_team_criticism_gap: 3
  red_team_min_debate_posts: 15

jobs:
  enabled: true
  auto_approve: false
  max_concurrent_jobs: 3
  default_compute_backend: local
  available_backends:
    - local
    - aws_batch
  nextflow_config_path: ./nextflow.config
  process_library_path: ./config/nf_processes.yaml
  work_dir: ./work
  result_retention_days: 30
  poll_interval_seconds: 30
  energy_injection:
    job_result: 0.3
